<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Oriana Wren Editorial Seal</title>
  <desc id="desc">Circular editorial seal logo for profile, watermark, and album branding.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#312820"/>
      <stop offset="58%" stop-color="#171513"/>
      <stop offset="100%" stop-color="#0c0d0c"/>
    </radialGradient>

    <linearGradient id="gold" x1="190" y1="120" x2="820" y2="900">
      <stop offset="0%" stop-color="#f7e6c8"/>
      <stop offset="42%" stop-color="#c09a66"/>
      <stop offset="100%" stop-color="#f2d5a5"/>
    </linearGradient>

    <linearGradient id="rose" x1="660" y1="170" x2="850" y2="360">
      <stop offset="0%" stop-color="#ffbdcd"/>
      <stop offset="100%" stop-color="#e8799a"/>
