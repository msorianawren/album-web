      <stop offset="0%" stop-color="#f6e5c8"/>
      <stop offset="48%" stop-color="#c39b67"/>
      <stop offset="100%" stop-color="#f2d2a0"/>
    </linearGradient>

    <linearGradient id="ink" x1="500" y1="110" x2="1320" y2="290">
