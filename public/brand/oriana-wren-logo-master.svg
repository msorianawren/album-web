<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Oriana Wren Master Logo</title>
  <desc id="desc">Quiet luxury Oriana Wren logo with OW monogram, wren feather, and blush petal accent.</desc>

  <defs>
    <radialGradient id="ow-bg" cx="34%" cy="26%" r="82%">
      <stop offset="0%" stop-color="#3a3028"/>
      <stop offset="54%" stop-color="#211a16"/>
      <stop offset="100%" stop-color="#101211"/>
    </radialGradient>

    <linearGradient id="ow-gold" x1="190" y1="160" x2="840" y2="850">
      <stop offset="0%" stop-color="#f6e6c8"/>
      <stop offset="42%" stop-color="#c9a16d"/>
      <stop offset="100%" stop-color="#f2d4a4"/>
    </linearGradient>

    <linearGradient id="ow-petal" x1="680" y1="120" x2="900" y2="340">
      <stop offset="0%" stop-color="#ffb7c9"/>
      <stop offset="100%" stop-color="#e8789a"/>
    </linearGradient>

    <filter id="ow-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="238" fill="url(#ow-bg)"/>

  <path d="M728 158 C820 132 886 176 872 259 C860 335 786 367 722 322 C668 284 668 184 728 158 Z"
