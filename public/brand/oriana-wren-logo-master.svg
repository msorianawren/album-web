  <circle cx="318" cy="263" r="11" fill="#f5d7a7" opacity="0.9"/>
  <circle cx="350" cy="301" r="6" fill="#f5d7a7" opacity="0.55"/>

  <text x="512" y="894" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="66" letter-spacing="18" fill="#f7e8d0">
    ORIANA WREN
