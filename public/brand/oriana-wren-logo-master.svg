  <circle cx="512" cy="514" r="282"
          fill="none" stroke="url(#ow-gold)" stroke-width="58" filter="url(#ow-shadow)"/>

  <circle cx="512" cy="514" r="218"
          fill="none" stroke="#fff7ea" stroke-width="3" opacity="0.16"/>

  <path d="M282 530 C337 650 387 733 440 733 C493 733 520 620 548 520 C578 622 608 733 661 733 C714 733 766 648 823 528"
        fill="none" stroke="url(#ow-gold)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M552 478 C612 397 683 343 769 319"
        fill="none" stroke="#f7e6ca" stroke-width="12" stroke-linecap="round" opacity="0.72"/>

  <path d="M607 412 C636 442 656 471 668 507"
        fill="none" stroke="#f7e6ca" stroke-width="8" stroke-linecap="round" opacity="0.46"/>

  <path d="M657 372 C692 402 714 435 729 476"
