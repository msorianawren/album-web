<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Oriana Wren Square Icon</title>
  <desc id="desc">Square OW monogram icon for app icons and profile branding.</desc>

  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="82%">
      <stop offset="0%" stop-color="#40342b"/>
      <stop offset="55%" stop-color="#211a16"/>
      <stop offset="100%" stop-color="#0f1110"/>
    </radialGradient>

    <linearGradient id="gold" x1="185" y1="170" x2="835" y2="850">
      <stop offset="0%" stop-color="#f7e8cc"/>
      <stop offset="45%" stop-color="#c49c67"/>
      <stop offset="100%" stop-color="#f0d0a0"/>
    </linearGradient>

    <linearGradient id="rose" x1="690" y1="100" x2="895" y2="320">
      <stop offset="0%" stop-color="#ffc0cf"/>
      <stop offset="100%" stop-color="#e97698"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.38"/>
