  <path d="M555 470 C616 391 688 335 780 306"
        fill="none" stroke="#f8e7ca" stroke-width="13" stroke-linecap="round" opacity="0.78"/>

  <path d="M613 405 C646 438 665 474 676 512"
        fill="none" stroke="#f8e7ca" stroke-width="8" stroke-linecap="round" opacity="0.48"/>

  <path d="M665 362 C701 395 724 432 738 478"
        fill="none" stroke="#f8e7ca" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
